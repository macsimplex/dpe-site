    <stop offset="0%" stop-color="#c9a052" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#c9a052" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- mark -->
