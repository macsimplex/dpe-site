  <ellipse cx="0" cy="0" rx="11" ry="46" fill="none" stroke="#c9a052" stroke-width="0.33" transform="rotate(36)"/>
  <ellipse cx="0" cy="0" rx="11" ry="46" fill="none" stroke="#c9a052" stroke-width="0.33" transform="rotate(72)"/>
  <ellipse cx="0" cy="0" rx="11" ry="46" fill="none" stroke="#c9a052" stroke-width="0.33" transform="rotate(108)"/>
  <ellipse cx="0" cy="0" rx="11" ry="46" fill="none" stroke="#c9a052" stroke-width="0.33" transform="rotate(144)"/>
  <circle cx="0" cy="0" r="3.8" fill="#c9a052"/>
  </g>
  <!-- DPE -->
